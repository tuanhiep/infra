spring:
  data:
    redis:
      repositories:
        enabled: false
  application:
    name: idempotent-payment-ledger
  profiles:
    default: jpa
  datasource:
    url: jdbc:postgresql://localhost:5432/paymentledger
    username: paymentledger
    password: paymentledger
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
