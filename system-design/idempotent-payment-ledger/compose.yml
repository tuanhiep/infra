services:
  postgres:
    image: postgres:16-alpine
    container_name: idempotent-payment-ledger-postgres
    environment:
      POSTGRES_DB: paymentledger
      POSTGRES_USER: paymentledger
      POSTGRES_PASSWORD: paymentledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paymentledger -d paymentledger"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: idempotent-payment-ledger-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
