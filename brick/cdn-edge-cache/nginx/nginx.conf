worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format edge_cache '$remote_addr "$request" $status '
                          'cache=$upstream_cache_status upstream=$upstream_addr '
                          'request_time=$request_time upstream_time=$upstream_response_time';

    access_log /var/log/nginx/access.log edge_cache;

    proxy_cache_path /var/cache/nginx/cdn-edge-cache
                     levels=1:2
                     keys_zone=cdn_edge_cache:20m
                     max_size=1g
                     inactive=30m
                     use_temp_path=off;

    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;

    upstream origin_pool {
        server origin:8080;
        keepalive 32;
    }

    server {
        listen 8081;
        server_name _;

        add_header X-Edge-Node "local-nginx-edge" always;
        add_header X-Cache-Status $upstream_cache_status always;

        if ($query_string ~* "(union.*select|<script|%3cscript)") {
            return 403;
        }

        location /assets/ {
            proxy_cache cdn_edge_cache;
            proxy_cache_key "$scheme|$host|$request_uri|$http_accept_encoding";
            proxy_cache_lock on;
            proxy_cache_valid 200 365d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://origin_pool;
        }

        location /api/products/ {
            limit_req zone=per_ip burst=20 nodelay;

            proxy_cache cdn_edge_cache;
            proxy_cache_key "$scheme|$host|$request_uri|$http_accept_encoding";
            proxy_cache_lock on;
            proxy_cache_valid 200 60s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_no_cache $http_authorization $arg_nocache;
            proxy_cache_bypass $http_authorization $arg_nocache;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://origin_pool;
        }

        location /api/ {
            limit_req zone=per_ip burst=5 nodelay;

            proxy_no_cache 1;
            proxy_cache_bypass 1;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://origin_pool;
        }

        location / {
            proxy_cache cdn_edge_cache;
            proxy_cache_key "$scheme|$host|$request_uri|$http_accept_encoding";
            proxy_cache_lock on;
            proxy_cache_valid 200 30s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://origin_pool;
        }
    }
}
