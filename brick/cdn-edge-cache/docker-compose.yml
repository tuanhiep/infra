services:
  origin:
    build:
      context: .
    ports:
      - "8080:8080"

  edge:
    image: nginx:1.27-alpine
    depends_on:
      - origin
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - edge-cache:/var/cache/nginx

volumes:
  edge-cache:
